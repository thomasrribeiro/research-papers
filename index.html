<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Papers — Thomas Ribeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="yellow-header"></div>

    <div class="container">
        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="breadcrumb-path">
                    <a href="https://thomasrribeiro.com" class="breadcrumb-segment breadcrumb-clickable">~</a>
                    <span class="breadcrumb-separator">/</span>
                    <a href="https://thomasrribeiro.com" class="breadcrumb-segment breadcrumb-clickable">thomasrribeiro</a>
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-segment">research-papers</span>
                </div>

                <!-- Nav -->
                <nav class="sidebar-nav">
                    <a href="#/" class="nav-item" data-route="feed">Feed</a>
                    <a href="#/trends" class="nav-item" data-route="trends">Trends</a>
                    <a href="#/settings" class="nav-item" data-route="settings">Settings</a>
                </nav>

                <!-- Pipeline status -->
                <div class="sidebar-section" id="pipeline-status">
                    <div class="sidebar-label">Pipeline</div>
                    <div class="status-dot" id="status-indicator"></div>
                    <div class="status-text" id="status-text">Loading...</div>
                    <div class="status-detail" id="status-detail"></div>
                </div>

                <!-- Stats -->
                <div class="sidebar-section" id="sidebar-stats">
                    <div class="sidebar-label">Stats</div>
                    <div class="stat-row"><span class="stat-key">total papers</span><span class="stat-val" id="stat-total">—</span></div>
                    <div class="stat-row"><span class="stat-key">today ranked</span><span class="stat-val" id="stat-today">—</span></div>
                </div>

                <!-- Category filter (shown on feed) -->
                <div class="sidebar-section" id="category-filter" style="display:none;">
                    <div class="sidebar-label">Category</div>
                    <div id="category-list"></div>
                </div>

                <!-- Theme toggle -->
                <div class="sidebar-section">
                    <button class="theme-toggle" id="theme-toggle">Toggle light/dark</button>
                </div>
            </aside>

            <!-- Main content -->
            <main class="main-content" id="app">
                <div class="loading-spinner">Loading...</div>
            </main>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
