  <rect x="198" y="190" width="38" height="4" rx="2" fill="#F5C842" opacity="0.6"/>

  <text x="20" y="218" font-family="monospace" font-size="7" fill="#555">cross-domain</text>
  <rect x="80" y="210" width="60" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="80" y="210" width="55" height="4" rx="2" fill="#F5C842" opacity="0.9"/>

  <text x="148" y="218" font-family="monospace" font-size="7" fill="#555">author rep</text>
