  <rect x="44" y="90" width="210" height="7" rx="1" fill="#2a2a2a"/>
  <rect x="44" y="100" width="160" height="5" rx="1" fill="#1e1e1e"/>
  <rect x="252" y="90" width="32" height="12" rx="2" fill="#1a0d1a"/>
  <text x="255" y="100" font-family="monospace" font-size="8" fill="#e040fb">71</text>

  <!-- Row 4 -->
  <rect x="20" y="120" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <text x="20" y="129" font-family="monospace" font-size="9" fill="#F5C842" font-weight="bold">04</text>
  <rect x="44" y="120" width="160" height="7" rx="1" fill="#2a2a2a"/>
  <rect x="44" y="130" width="100" height="5" rx="1" fill="#1e1e1e"/>
