  <rect x="20" y="30" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <text x="20" y="39" font-family="monospace" font-size="9" fill="#F5C842" font-weight="bold">01</text>
  <rect x="44" y="30" width="200" height="7" rx="1" fill="#2a2a2a"/>
  <rect x="44" y="40" width="140" height="5" rx="1" fill="#1e1e1e"/>
  <rect x="252" y="30" width="32" height="12" rx="2" fill="#0d2e1a"/>
  <text x="255" y="40" font-family="monospace" font-size="8" fill="#4caf50">87</text>

  <!-- Row 2 -->
  <rect x="20" y="60" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <text x="20" y="69" font-family="monospace" font-size="9" fill="#F5C842" font-weight="bold">02</text>
  <rect x="44" y="60" width="180" height="7" rx="1" fill="#2a2a2a"/>
  <rect x="44" y="70" width="120" height="5" rx="1" fill="#1e1e1e"/>
