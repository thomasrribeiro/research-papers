  <!-- Row 5 -->
  <rect x="20" y="150" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <text x="20" y="159" font-family="monospace" font-size="9" fill="#F5C842" font-weight="bold">05</text>
  <rect x="44" y="150" width="190" height="7" rx="1" fill="#2a2a2a"/>
  <rect x="44" y="160" width="130" height="5" rx="1" fill="#1e1e1e"/>
  <rect x="252" y="150" width="32" height="12" rx="2" fill="#2e1e0d"/>
  <text x="255" y="160" font-family="monospace" font-size="8" fill="#ffb300">58</text>

  <!-- Score bars at bottom -->
  <text x="20" y="198" font-family="monospace" font-size="7" fill="#555">citation vel</text>
  <rect x="80" y="190" width="60" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="80" y="190" width="48" height="4" rx="2" fill="#F5C842" opacity="0.8"/>

  <text x="148" y="198" font-family="monospace" font-size="7" fill="#555">altmetric</text>
